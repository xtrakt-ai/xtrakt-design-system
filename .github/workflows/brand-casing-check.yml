name: Brand Casing Check

# Fails CI on any prose "cogneris" (lowercase) in customer-facing surfaces.
# Per cogneris-brand-guidelines v1.3 § 9 in xtrakt-site, the brand name in prose
# is title-case "Cogneris". The audit only reads files — no untrusted input
# flows into shell commands.

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/brand_casing_audit.py'
      - '.github/workflows/brand-casing-check.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'

permissions:
  contents: read

jobs:
  brand-casing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run brand-casing audit
        run: python3 scripts/brand_casing_audit.py packages/
