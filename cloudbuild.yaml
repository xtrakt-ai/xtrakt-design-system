substitutions:
  _NPM_REGISTRY: https://npm.pkg.github.com/
  _NPM_SCOPE: "@xtrakt-ai"
  _NODE_IMAGE: node:20

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/git-packages-token/versions/latest
      env: GH_TOKEN

# Publishes the four @xtrakt-ai/* workspace packages to GitHub Packages on
# push to main. Each publish is gated by a "version already published" check
# so re-running without a version bump is a no-op (mirrors the old
# publish.yml behaviour). `npm install` (not `ci`) matches the workspace's
# previous CI: it tolerates a stale/absent lockfile and still resolves the
# @xtrakt-ai/design-tokens peer dep (needs auth even for read).
steps:
  # XTRAK-131 — compatibility-alias boundary guard. Zero-dependency, so it
  # runs before install/auth: a legacy alias leaking into packages/* outside
  # the approved sources (see packages/design-tokens/D-04_COMPAT_ALIAS_BOUNDARY.md)
  # must fail the build before anything is published.
  - id: lint-tokens-legacy
    name: ${_NODE_IMAGE}
    entrypoint: node
    args: [scripts/check-legacy-token-usage.mjs]

  - id: write-npmrc
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    secretEnv: [GH_TOKEN]
    args:
      - -c
      - |
        cat > .npmrc <<EOF
        ${_NPM_SCOPE}:registry=${_NPM_REGISTRY}
        //npm.pkg.github.com/:_authToken=$$GH_TOKEN
        always-auth=true
        EOF

  - id: install
    name: ${_NODE_IMAGE}
    entrypoint: npm
    args: [install, --no-audit, --no-fund]

  - id: build
    name: ${_NODE_IMAGE}
    entrypoint: bash
    args:
      - -c
      - npm run build --workspaces --if-present

  - id: publish
    name: ${_NODE_IMAGE}
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        for pkg in design-tokens frontend-auth ui-vue ui-angular; do
          name="${_NPM_SCOPE}/$$pkg"
          version=$(node -p "require('./packages/$$pkg/package.json').version")
          if npm view "$$name@$$version" version --registry ${_NPM_REGISTRY} >/dev/null 2>&1; then
            echo "$$name@$$version already published — skipping."
          else
            echo "Publishing $$name@$$version..."
            npm publish -w "$$name"
          fi
        done

timeout: 1800s
